# 🧪 TEST: commonpayloaddata.cpd.yaml
#
# Aims:
#
# Expectations:


# the cpd.yaml representation provides
# a small amount of compression to what is assumed to be an upstream
# jsonl input. thus, the jsonl source is EXPECTED to have a time
# and possibly tags; these are treated as special keys. no other assumptions;
# and thus there are no key collisions due to overlapping with reserved words

_schemas:
  # this is the CommonPayloadData schema;
  # we should probably be able to fold this into the core
  # so it's the implied schema
  data:
    type: array
    items:
      type: array
      minItems: 3
      maxItems: 3
      items:
        - type: string  # timestamp
          description: "ISO8601 / RFC3339 string"
          examples:
          - "2024-06-12T12:00:00Z"
          - "2022-11-06T23:12:47+08:00"
        - type: array   # tags array
          items:
            type: integer
          uniqueItems: true
          examples:
          - [1, 5, 3299]
          - []
        - type: object            # payload object
_columns:
  - time
  - tags
  - payload
tags:
  # this is data-dependent
  temperature: 1
  humidity: 2
  light: 3
  motion: 4
  door_open: 5
  power: 6
  battery_low: 7
  sensor_fault: 8
  fan_on: 9
  presence: 10

data:
  - ["2024-06-11 00:20:43.123+00:00", [1, 2], {temp_c: 23.4, humidity: 45.2}]
  - ["2024-06-12T12:00:00Z", [], {lux: 320, motion_detected: false}]
  - ["2022-11-06T23:12:47+08:00", [4, 5], {motion_detected: true, door_open: true}]
  - ["2024-06-11 01:21:28+00:00", [], {power_kw: 0.512, voltage_v: 220.1}]
  - ["2023-01-01T00:00:00-05:00", [5, 7, 8, 10], {battery_level: 5, fault_code: "E42"}]
  - ["2023-03-28 10:40:00.0+00:00", [9, 10], {fan_speed_rpm: 1800, presence: true}]
  - ["2025-06-12T08:30:45Z", [1, 10], {temp_c: 26.1, humidity: 50}]
  - ["2024-03-15T17:45:00+01:00", [3], {lux: 820}]
  - ["2023-11-14 22:13:19.999+00:00", [], {"status": "idle", "uptime_s": 123456}]
  - ["2024-12-25T00:00:00Z", [6], {power_kw: 1.05, load_percent: 75}]
