## 🧪 TEST: compacted.yaml
#
# Aims:
# - Validate columnar compaction mode with join tables and _columns
# - Ensure enum-like field values (status) are replaced by IDs
#
# Expectations:
# - `status` is replaced by numeric IDs via a join-table map
# - All records are represented as positional arrays aligned with _columns
# - Schema must support optional or null status, and required numeric time
# - Record structure must be uniform; partial fields are not allowed in compacted mode
# - JSONL expansion should reconstruct original field names and values from IDs

#
#
# standby, error	More enum expansion, join table robustness
# Reordered keys	Confirm _columns governs order during compaction
# Duplicate values	Stability under repetition
# null status	Schema + join inference tolerance
# Numeric time progression	Ensure order isn’t corrupted by array compaction

_schemas:
  data:
    type: array
    items:
      type: object
      properties:
        status:
          type: [string, "null"]
        time:
          type: number
        comment:
          type: string
      required: [time]
_columns:
- status
- time
- comment
status:
  on: 1
  off: 2
  standby: 3
  error: 4
data:
  - [1, 1, "system initialized"]
  - [2, 2, "manual shutdown"]
  - [1, 3, "auto-restart triggered"]
  - [3, 4, "awaiting input"]
  - [2, 5, "manual shutdown"]
  - [4, 6, "fault code 17"]
  - [1, 7, "system idle"]
  - [2, 8, "scheduled cycle"]
  - [3, 9, "queued"]
  - [null, 10, "unlogged state"]

