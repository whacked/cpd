build:
  in:
    - main.go
    - embed.go
    - version.go
  out: ./cpd
  run: go build -o $out $in

build-with-cue:
  in:
    - main.go
    - embed.go
    - cue_demo.go
    - version.go
  out: ./cpd
  run: go build -tags cue -o $out $in

version.go:
  in: Sdflow.yaml
  out: version.go
  run: |
    today=$(date +%Y%m%d)
    git_commits_today=$(git log --pretty=format:"%cd %h" --date=format:"%Y%m%d" | tac | grep "^$today")
    number_commits_today=$(echo "$git_commits_today" | wc -l)
    latest_sha=$(echo "$git_commits_today" | tail -1 | awk '{print $NF}')

    echo 'package main

    const version = "'$today.$number_commits_today.$latest_sha'"' > $out

./default.nix:
  in:
    - version.go
    - default.nix
  run: |
    version_string=$(cat ${in[0]} | tail -1 | awk '{print $NF}' | tr -d '"')
    current_default_nix=$(cat ${in[1]})
    echo -e "$current_default_nix" | sed -E 's|version\s+=.+;|version = "'$version_string'";|' | tee ${in[1]}

version:
  in: version.go
  run: cat $in | tail -1 | awk '{print $NF}' | tr -d '"'


# schemas stuff
schemas:
  in: src/autogen/schemas/YamlFile.tagged.schema.json

yaml-database-schema:
  in: templates/schemas/YamlFile.tagged.schema.jsonnet
  out: src/autogen/schemas/YamlFile.tagged.schema.json
  run: |
    test -d $(dirname $in) || mkdir -p $(dirname $out)
    jsonnet $in | jq -S | tee $out



# test stuff
test:
  #go test -v ./pkg/codec -run TestCPDToSQLite
  run: go test -v ./pkg/codec

copy-data-file:
  in: /Users/alexh/cloudsync/orgzly/biolog-combined.json
  out: /tmp/biolog-combined.jsonl
  run: cp -i $in $out

yaml-generation-test:
  in:
    - asdf.go
    - /tmp/biolog-combined.jsonl
  run: go run ${in[0]} -demo cpd -join-tables device,category -cpd-file ${in[1]} | sed -n '/^_columns:/,$p' | tee $out
  out: /tmp/biolog-combined.cpd.yaml

jsonl-recovery-test:
  in:
    - asdf.go
    - /tmp/biolog-combined.cpd.yaml
  out: /tmp/biolog-combined.recovered.jsonl
  run: go run ${in[0]} -demo cpd -cpd-file ${in[1]} | sed -n '/^{/,$p' | tee $out

compare-recovered-file:
  in:
    - /tmp/biolog-combined.jsonl
    - /tmp/biolog-combined.recovered.jsonl
  run: diff -u <(jq -c -S '.' ${in[0]} | sort -u) <(jq -c -S '.' ${in[1]} | sort -u)

tosql-test:
  in: /tmp/biolog-combined.cpd.yaml
  run: go run asdf.go -demo cpd -cpd-file $in -toSql
